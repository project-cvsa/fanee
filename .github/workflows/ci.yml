name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  
  workflow_dispatch:

jobs:
  ci:
    name: CI Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Run check
        run: bun run ci